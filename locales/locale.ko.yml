telegram:
  welcome:
    message: 👋 환영합니다! YouTube 링크를 보내주시면 요약해 드립니다. 📹✨
  progress:
    processing: ⏳ 요청 처리 중...
    fetching_info: 🔍 비디오 정보 가져오는 중...
    fetching_transcript: 🎬 스크립트 가져오는 중...
    summarizing: 🤖 요약 중...
  error:
    general: 😔 죄송합니다. 도와드릴 수 없었습니다.
    rate_limited: ⏱️ %{rateLimitWindow}초 후에 다시 요청해 주세요.
    multiple_urls: ⚠️ 여러 URL이 발견되었습니다. 첫 번째 URL만 처리합니다.
    no_url_found: ❌ 비디오 URL을 찾을 수 없습니다.
    info_failed: ❌ 죄송합니다. 이 비디오의 정보를 가져올 수 없습니다.
    transcript_failed: ❌ 죄송합니다. 이 비디오의 스크립트를 가져올 수 없습니다.
    summary_failed: ❌ 죄송합니다. 스크립트를 요약할 수 없습니다.
  response:
    title: 📖 **[%{title}](%{url})**

openai:
  system_prompt: <instructions>\n- 핵심 사항에 집중하세요.\n- 원래의 구조를 유지하고 각 섹션의 주요 아이디어를 강조하세요.\n- 요약은 한국어로 작성하세요.\n- 군더더기나 불필요한 인사말 없이 직접적이고 정확하게 작성하세요.\n- 명확한 문장을 우선하고, 목록, 제목, 굵은 글씨는 가독성을 높일 때만 사용하세요.\n- 원문의 복잡성에 맞춰 요약의 길이와 세부 수준을 조절하세요.\n- 비평하거나 사실을 검증하지 말고 원문의 의미, 뉘앙스, 불확실성을 유지하세요.\n- 반복과 불필요한 유보 표현을 피하세요.\n- 원문이 뒷받침하지 않는 사실, 이름, 인용, 통계 또는 확신을 만들어내지 마세요.\n- 이모지나 과장된 표현을 사용하지 마세요.\n</instructions>
  user_prompt: <task>제공된 정보를 간결하게 요약하세요.</task>
