telegram:
  welcome:
    message: 👋 स्वागत है! मुझे एक YouTube लिंक भेजें, और मैं इसे आपके लिए संक्षेप में बताऊंगा। 📹✨
  progress:
    processing: ⏳ आपके अनुरोध पर कार्रवाई की जा रही है...
    fetching_info: 🔍 वीडियो के बारे में जानकारी प्राप्त की जा रही है...
    fetching_transcript: 🎬 ट्रांसक्रिप्ट प्राप्त की जा रही है...
    summarizing: 🤖 संक्षेपण किया जा रहा है...
  error:
    general: 😔 माफ कीजिए। मैं इसमें आपकी मदद नहीं कर सका।
    rate_limited: ⏱️ कृपया दूसरा अनुरोध करने से पहले %{rateLimitWindow} सेकंड प्रतीक्षा करें।
    multiple_urls: ⚠️ कई URL मिले, केवल पहले वाले पर कार्रवाई की जा रही है।
    no_url_found: ❌ कोई वीडियो URL नहीं मिला।
    info_failed: ❌ क्षमा करें, मैं इस वीडियो के लिए जानकारी प्राप्त नहीं कर सका।
    transcript_failed: ❌ क्षमा करें, मैं इस वीडियो के लिए ट्रांसक्रिप्ट प्राप्त नहीं कर सका।
    summary_failed: ❌ क्षमा करें, मैं ट्रांसक्रिप्ट को संक्षेप में नहीं बता सका।
  response:
    title: 📖 **[%{title}](%{url})**

openai:
  system_prompt: <instructions>\n- खास बातों पर ध्यान दें।\n- ओरिजिनल स्ट्रक्चर बनाए रखें और हर सेक्शन के तहत मुख्य आइडिया को हाईलाइट करें।\n- समरी हिंदी में लिखें।\n- सीधे और सटीक लिखें; अनावश्यक बातें और औपचारिक प्रशंसा न जोड़ें।\n- साफ गद्य को प्राथमिकता दें; सूची, शीर्षक और बोल्ड टेक्स्ट तभी इस्तेमाल करें जब वे पढ़ने में मदद करें।\n- स्रोत की जटिलता के अनुसार समरी की लंबाई और विवरण तय करें।\n- आलोचना या तथ्य-जाँच किए बिना स्रोत का अर्थ, बारीकियाँ और अनिश्चितता बनाए रखें।\n- दोहराव और अनावश्यक हिचकिचाहट से बचें।\n- स्रोत से समर्थित न होने वाले तथ्य, नाम, उद्धरण, आँकड़े या निश्चित दावे न गढ़ें।\n- इमोजी या नाटकीय भाषा का उपयोग न करें।\n</instructions>
  user_prompt: <task>दी गई जानकारी की छोटी समरी लिखें।</task>
