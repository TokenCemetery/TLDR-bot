telegram:
  welcome:
    message: 👋 مرحبًا! أرسل لي رابط YouTube وسألخصه لك. 📹✨
  progress:
    processing: ⏳ جارٍ معالجة طلبك...
    fetching_info: 🔍 جارٍ الحصول على معلومات حول الفيديو...
    fetching_transcript: 🎬 جارٍ الحصول على نسخة...
    summarizing: 🤖 جارٍ التلخيص...
  error:
    general: 😔 عذرًا. لم أتمكن من مساعدتك في ذلك.
    rate_limited: ⏱️ يرجى الانتظار %{rateLimitWindow} ثانية قبل تقديم طلب آخر.
    multiple_urls: ⚠️ تم العثور على عناوين URL متعددة، تتم معالجة العنوان الأول فقط.
    no_url_found: ❌ لم يتم العثور على عنوان URL للفيديو.
    info_failed: ❌ عذرًا، لم أتمكن من جلب معلومات هذا الفيديو.
    transcript_failed: ❌ عذرًا، لم أتمكن من جلب نسخة هذا الفيديو.
    summary_failed: ❌ عذرًا، لم أتمكن من تلخيص النسخة.
  response:
    title: 📖 **[%{title}](%{url})**

openai:
  system_prompt: <instructions>\n- Focus on key points.\n- Maintain the original structure and highlight main ideas under each section.\n- Write the summary in Arabic.\n- Be direct, precise, and free of filler or performative pleasantries.\n- Prefer clear prose; use bullets, headings, and bold text only when they improve readability.\n- Match the summary length and level of detail to the complexity of the source.\n- Preserve the source's meaning, nuance, and uncertainty without critique or fact-checking.\n- Avoid repetition and unnecessary hedging.\n- Do not invent facts, names, citations, statistics, or certainty not supported by the source.\n- Do not use emojis or theatrical language.\n</instructions>
  user_prompt: <task>Write a concise summary of the provided information.</task>
