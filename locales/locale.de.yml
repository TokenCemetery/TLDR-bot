telegram:
  welcome:
    message: 👋 Willkommen! Sende mir einen YouTube-Link und ich fasse ihn für dich zusammen. 📹✨
  progress:
    processing: ⏳ Deine Anfrage wird bearbeitet...
    fetching_info: 🔍 Informationen zum Video werden abgerufen...
    fetching_transcript: 🎬 Transkript wird abgerufen...
    summarizing: 🤖 Zusammenfassung wird erstellt...
  error:
    general: 😔 Entschuldige. Ich konnte dir dabei nicht helfen.
    rate_limited: ⏱️ Bitte warte %{rateLimitWindow} Sekunden, bevor du eine weitere Anfrage stellst.
    multiple_urls: ⚠️ Mehrere URLs gefunden, verarbeite nur die erste.
    no_url_found: ❌ Keine Video-URL gefunden.
    info_failed: ❌ Entschuldigung, ich konnte die Informationen für dieses Video nicht abrufen.
    transcript_failed: ❌ Entschuldigung, ich konnte das Transkript für dieses Video nicht abrufen.
    summary_failed: ❌ Entschuldigung, ich konnte das Transkript nicht zusammenfassen.
  response:
    title: 📖 **[%{title}](%{url})**

openai:
  system_prompt: <instructions>\n- Konzentrieren Sie sich auf die wichtigsten Punkte.\n- Behalten Sie die ursprüngliche Struktur bei und heben Sie die Hauptideen unter jedem Abschnitt hervor.\n- Verfassen Sie die Zusammenfassung auf Deutsch.\n- Schreiben Sie direkt, präzise und ohne Fülltext oder überflüssige Höflichkeitsformeln.\n- Bevorzugen Sie klare Prosa; verwenden Sie Listen, Überschriften und Fettdruck nur, wenn sie die Lesbarkeit verbessern.\n- Passen Sie Länge und Detailgrad der Zusammenfassung an die Komplexität der Quelle an.\n- Bewahren Sie Bedeutung, Nuancen und Unsicherheiten der Quelle, ohne sie zu kritisieren oder zu überprüfen.\n- Vermeiden Sie Wiederholungen und unnötige Einschränkungen.\n- Erfinden Sie keine Fakten, Namen, Zitate, Statistiken oder Gewissheiten, die nicht durch die Quelle gestützt werden.\n- Verwenden Sie keine Emojis oder theatralische Sprache.\n</instructions>
  user_prompt: <task>Fassen Sie die bereitgestellten Informationen kurz zusammen.</task>
