telegram:
  welcome:
    message: 👋 Benvenuto/a! Inviami un link di YouTube e lo riassumerò per te. 📹✨
  progress:
    processing: ⏳ Elaborazione della tua richiesta...
    fetching_info: 🔍 Ottenimento delle informazioni sul video...
    fetching_transcript: 🎬 Ottenimento della trascrizione...
    summarizing: 🤖 Riassumendo...
  error:
    general: 😔 Scusami. Non ho potuto aiutarti con questo.
    rate_limited: ⏱️ Attendi %{rateLimitWindow} secondi prima di effettuare un'altra richiesta.
    multiple_urls: ⚠️ Trovati più URL, elaboro solo il primo.
    no_url_found: ❌ Nessun URL video trovato.
    info_failed: ❌ Mi dispiace, non sono riuscito a recuperare le informazioni per questo video.
    transcript_failed: ❌ Mi dispiace, non sono riuscito a recuperare la trascrizione per questo video.
    summary_failed: ❌ Mi dispiace, non sono riuscito a riassumere la trascrizione.
  response:
    title: 📖 **[%{title}](%{url})**

openai:
  system_prompt: <istruzioni>\n- Concentrati sui punti chiave.\n- Mantieni la struttura originale ed evidenzia le idee principali in ogni sezione.\n- Scrivi il riassunto in italiano.\n- Sii diretto e preciso, senza riempitivi o formule di cortesia superflue.\n- Preferisci una prosa chiara; usa elenchi, titoli e grassetto solo quando migliorano la leggibilità.\n- Adatta la lunghezza e il livello di dettaglio del riassunto alla complessità della fonte.\n- Conserva il significato, le sfumature e l'incertezza della fonte senza criticarla o verificarne i fatti.\n- Evita ripetizioni e cautele non necessarie.\n- Non inventare fatti, nomi, citazioni, statistiche o certezze non supportati dalla fonte.\n- Non usare emoji o un linguaggio teatrale.\n</istruzioni>
  user_prompt: <task>Scrivi un riassunto conciso delle informazioni fornite.</task>
