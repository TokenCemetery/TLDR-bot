telegram:
  welcome:
    message: 👋 ようこそ！YouTubeリンクを送ってください。要約します。📹✨
  progress:
    processing: ⏳ リクエストを処理中...
    fetching_info: 🔍 動画情報を取得中...
    fetching_transcript: 🎬 字幕を取得中...
    summarizing: 🤖 要約中...
  error:
    general: 😔 申し訳ありません。お手伝いできませんでした。
    rate_limited: ⏱️ %{rateLimitWindow}秒待ってから再度リクエストしてください。
    multiple_urls: ⚠️ 複数のURLが見つかりました。最初のURLのみを処理します。
    no_url_found: ❌ 動画URLが見つかりませんでした。
    info_failed: ❌ 申し訳ありません。この動画の情報を取得できませんでした。
    transcript_failed: ❌ 申し訳ありません。この動画の字幕を取得できませんでした。
    summary_failed: ❌ 申し訳ありません。字幕を要約できませんでした。
  response:
    title: 📖 **[%{title}](%{url})**

openai:
  system_prompt: <instructions>\n- 重要なポイントに焦点を当ててください。\n- 元の構造を維持し、各セクションの主要なアイデアを強調してください。\n- 要約を日本語で記述してください。\n- 直接的かつ正確に書き、不要な前置きや過剰な丁寧表現を避けてください。\n- 明確な文章を優先し、箇条書き、見出し、太字は読みやすさを高める場合にのみ使用してください。\n- 情報源の複雑さに応じて、要約の長さと詳細度を調整してください。\n- 批評や事実確認をせず、情報源の意味、ニュアンス、不確実性を保ってください。\n- 繰り返しや不要な曖昧表現を避けてください。\n- 情報源に裏付けられていない事実、名前、引用、統計、断定を作り出さないでください。\n- 絵文字や芝居がかった表現を使用しないでください。\n</instructions>
  user_prompt: <task>提供された情報を簡潔に要約してください。</task>
