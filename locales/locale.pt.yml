telegram:
  welcome:
    message: 👋 Bem-vindo! Envie-me um link do YouTube e eu o resumirei para você. 📹✨
  progress:
    processing: ⏳ Processando sua solicitação...
    fetching_info: 🔍 Obtendo informações sobre o vídeo...
    fetching_transcript: 🎬 Obtendo a transcrição...
    summarizing: 🤖 Resumindo...
  error:
    general: 😔 Desculpe. Não consegui te ajudar com isso.
    rate_limited: ⏱️ Por favor, espere %{rateLimitWindow} segundos antes de fazer outra solicitação.
    multiple_urls: ⚠️ Encontrei vários URLs, processando apenas o primeiro.
    no_url_found: ❌ Nenhum URL de vídeo encontrado.
    info_failed: ❌ Desculpe, não consegui obter as informações para este vídeo.
    transcript_failed: ❌ Desculpe, não consegui obter a transcrição para este vídeo.
    summary_failed: ❌ Desculpe, não consegui resumir a transcrição.
  response:
    title: 📖 **[%{title}](%{url})**

openai:
  system_prompt: <instructions>\n- Concentre-se nos pontos principais.\n- Mantenha a estrutura original e destaque as ideias principais em cada secção.\n- Escreva o resumo em português.\n- Seja direto e preciso, sem texto de enchimento ou cortesias desnecessárias.\n- Prefira prosa clara; use listas, títulos e negrito apenas quando melhorarem a legibilidade.\n- Ajuste a extensão e o nível de detalhe do resumo à complexidade da fonte.\n- Preserve o significado, as nuances e a incerteza da fonte sem a criticar ou verificar os factos.\n- Evite repetições e ressalvas desnecessárias.\n- Não invente factos, nomes, citações, estatísticas ou certezas que não sejam sustentados pela fonte.\n- Não use emojis nem linguagem teatral.\n</instructions>
  user_prompt: <task>Escreva um resumo conciso das informações fornecidas.</task>
