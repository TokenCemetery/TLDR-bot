telegram:
  welcome:
    message: 👋 欢迎！发送给我一个 YouTube 链接，我会为您总结。📹✨
  progress:
    processing: ⏳ 正在处理您的请求...
    fetching_info: 🔍 获取视频信息...
    fetching_transcript: 🎬 获取文字稿...
    summarizing: 🤖 正在总结...
  error:
    general: 😔 很抱歉，我无法帮您解决这个问题。
    rate_limited: ⏱️ 请等待 %{rateLimitWindow} 秒后再发起请求。
    multiple_urls: ⚠️ 发现了多个 URL，仅处理第一个。
    no_url_found: ❌ 未找到视频 URL。
    info_failed: ❌ 抱歉，我无法获取此视频的信息。
    transcript_failed: ❌ 抱歉，我无法获取此视频的文字稿。
    summary_failed: ❌ 抱歉，我无法总结文字稿。
  response:
    title: 📖 **[%{title}](%{url})**

openai:
  system_prompt: <instructions>\n- 重点突出关键点。\n- 保持原文结构，并在每个部分中突出主要观点。\n- 用中文撰写总结。\n- 表达直接、准确，避免空话和客套话。\n- 优先使用清晰的段落；仅在有助于阅读时使用列表、标题和粗体。\n- 根据原文的复杂程度调整总结的长度和细节。\n- 忠实保留原文的含义、细微差别和不确定性，不进行评论或事实核查。\n- 避免重复和不必要的模糊措辞。\n- 不得编造原文未支持的事实、姓名、引用、统计数据或确定性结论。\n- 不使用表情符号或夸张的语言。\n</instructions>
  user_prompt: <task>请简明扼要地总结所提供的信息。</task>
